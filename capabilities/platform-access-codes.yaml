naftiko: 1.0.0-alpha2
info:
  label: ADT+ Platform API — Access Codes
  description: 'ADT+ Platform API — Access Codes. 3 operations. Lead operation: ADT List Access Codes. Self-contained Naftiko
    capability covering one Adt business surface.'
  tags:
  - Adt
  - Access Codes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADT_API_KEY: ADT_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-access-codes
    baseUri: https://api.adt.com/v1
    description: ADT+ Platform API — Access Codes business capability. Self-contained, no shared references.
    resources:
    - name: systems-systemId-access-codes
      path: /systems/{systemId}/access-codes
      operations:
      - name: getaccesscodes
        method: GET
        description: ADT List Access Codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: systemId
          in: path
          type: string
          description: Security system ID.
          required: true
      - name: createaccesscode
        method: POST
        description: ADT Create an Access Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: systemId
          in: path
          type: string
          description: Security system ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: systems-systemId-access-codes-codeId
      path: /systems/{systemId}/access-codes/{codeId}
      operations:
      - name: deleteaccesscode
        method: DELETE
        description: ADT Delete an Access Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: systemId
          in: path
          type: string
          description: Security system ID.
          required: true
        - name: codeId
          in: path
          type: string
          description: Access code ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.ADT_API_KEY}}'
  exposes:
  - type: rest
    namespace: platform-access-codes-rest
    port: 8080
    description: REST adapter for ADT+ Platform API — Access Codes. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/systems/{systemid}/access-codes
      name: systems-systemid-access-codes
      description: REST surface for systems-systemId-access-codes.
      operations:
      - method: GET
        name: getaccesscodes
        description: ADT List Access Codes
        call: platform-access-codes.getaccesscodes
        with:
          systemId: rest.systemId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createaccesscode
        description: ADT Create an Access Code
        call: platform-access-codes.createaccesscode
        with:
          systemId: rest.systemId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/systems/{systemid}/access-codes/{codeid}
      name: systems-systemid-access-codes-codeid
      description: REST surface for systems-systemId-access-codes-codeId.
      operations:
      - method: DELETE
        name: deleteaccesscode
        description: ADT Delete an Access Code
        call: platform-access-codes.deleteaccesscode
        with:
          systemId: rest.systemId
          codeId: rest.codeId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-access-codes-mcp
    port: 9090
    transport: http
    description: MCP adapter for ADT+ Platform API — Access Codes. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adt-list-access-codes
      description: ADT List Access Codes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-access-codes.getaccesscodes
      with:
        systemId: tools.systemId
      outputParameters:
      - type: object
        mapping: $.
    - name: adt-create-access-code
      description: ADT Create an Access Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-access-codes.createaccesscode
      with:
        systemId: tools.systemId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: adt-delete-access-code
      description: ADT Delete an Access Code
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: platform-access-codes.deleteaccesscode
      with:
        systemId: tools.systemId
        codeId: tools.codeId
      outputParameters:
      - type: object
        mapping: $.
