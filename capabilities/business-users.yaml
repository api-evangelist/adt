naftiko: 1.0.0-alpha2
info:
  label: ADT Business API — Users
  description: 'ADT Business API — Users. 1 operations. Lead operation: ADT List Site Users. Self-contained Naftiko capability
    covering one Adt business surface.'
  tags:
  - Adt
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADT_API_KEY: ADT_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-users
    baseUri: https://api.adt.com/business/v1
    description: ADT Business API — Users business capability. Self-contained, no shared references.
    resources:
    - name: sites-siteId-users
      path: /sites/{siteId}/users
      operations:
      - name: getsiteusers
        method: GET
        description: ADT List Site Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: siteId
          in: path
          type: string
          description: Business site ID.
          required: true
    authentication:
      type: bearer
      token: '{{env.ADT_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-users-rest
    port: 8080
    description: REST adapter for ADT Business API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/sites/{siteid}/users
      name: sites-siteid-users
      description: REST surface for sites-siteId-users.
      operations:
      - method: GET
        name: getsiteusers
        description: ADT List Site Users
        call: business-users.getsiteusers
        with:
          siteId: rest.siteId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for ADT Business API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: adt-list-site-users
      description: ADT List Site Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-users.getsiteusers
      with:
        siteId: tools.siteId
      outputParameters:
      - type: object
        mapping: $.
