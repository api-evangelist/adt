naftiko: 1.0.0-alpha2
info:
  label: ADT Business API — Access Control
  description: 'ADT Business API — Access Control. 2 operations. Lead operation: ADT List Access Control Credentials. Self-contained
    Naftiko capability covering one Adt business surface.'
  tags:
  - Adt
  - Access Control
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ADT_API_KEY: ADT_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-access-control
    baseUri: https://api.adt.com/business/v1
    description: ADT Business API — Access Control business capability. Self-contained, no shared references.
    resources:
    - name: sites-siteId-access-control-credentials
      path: /sites/{siteId}/access-control/credentials
      operations:
      - name: getcredentials
        method: GET
        description: ADT List Access Control Credentials
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: siteId
          in: path
          type: string
          description: Business site ID.
          required: true
      - name: createcredential
        method: POST
        description: ADT Create an Access Credential
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: siteId
          in: path
          type: string
          description: Business site ID.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.ADT_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-access-control-rest
    port: 8080
    description: REST adapter for ADT Business API — Access Control. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sites/{siteid}/access-control/credentials
      name: sites-siteid-access-control-credentials
      description: REST surface for sites-siteId-access-control-credentials.
      operations:
      - method: GET
        name: getcredentials
        description: ADT List Access Control Credentials
        call: business-access-control.getcredentials
        with:
          siteId: rest.siteId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createcredential
        description: ADT Create an Access Credential
        call: business-access-control.createcredential
        with:
          siteId: rest.siteId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-access-control-mcp
    port: 9090
    transport: http
    description: MCP adapter for ADT Business API — Access Control. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: adt-list-access-control-credentials
      description: ADT List Access Control Credentials
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-access-control.getcredentials
      with:
        siteId: tools.siteId
      outputParameters:
      - type: object
        mapping: $.
    - name: adt-create-access-credential
      description: ADT Create an Access Credential
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-access-control.createcredential
      with:
        siteId: tools.siteId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
