naftiko: "1.0.0-alpha1"

info:
  label: "ADT+ Platform API"
  description: "REST API for managing ADT smart home security systems, devices, sensors, cameras, access codes, and automation rules for residential and small business customers."
  tags:
    - ADT
    - Home Security
    - Smart Home
    - IoT
    - Monitoring
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ADT_ACCESS_TOKEN: ADT_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: adt-platform
      baseUri: https://api.adt.com/v1
      description: "ADT+ Platform REST API for security system management."
      authentication:
        type: bearer
        token: "{{ADT_ACCESS_TOKEN}}"
      resources:
        - name: systems
          path: /systems
          description: "Security systems management."
          operations:
            - name: list-systems
              method: GET
              description: "List all security systems for the account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-system
              method: GET
              description: "Get details of a specific security system."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: arm-system
              method: POST
              description: "Arm a security system in away or stay mode."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  mode: "{{tools.mode}}"
                  accessCode: "{{tools.accessCode}}"
            - name: disarm-system
              method: POST
              description: "Disarm a security system."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  accessCode: "{{tools.accessCode}}"

        - name: devices
          path: /systems/{systemId}/devices
          description: "Security devices and sensors."
          operations:
            - name: list-devices
              method: GET
              description: "List all devices in a security system."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Filter by device type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: events
          path: /systems/{systemId}/events
          description: "Security events and alarm history."
          operations:
            - name: list-events
              method: GET
              description: "List security events for a system."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
                - name: startDate
                  in: query
                  type: string
                  required: false
                  description: "Start date filter."
                - name: endDate
                  in: query
                  type: string
                  required: false
                  description: "End date filter."
                - name: type
                  in: query
                  type: string
                  required: false
                  description: "Event type filter."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: access-codes
          path: /systems/{systemId}/access-codes
          description: "Access code management."
          operations:
            - name: list-access-codes
              method: GET
              description: "List all access codes."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-access-code
              method: POST
              description: "Create a new access code."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  code: "{{tools.code}}"
                  type: "{{tools.type}}"

        - name: video-clips
          path: /systems/{systemId}/cameras/{cameraId}/clips
          description: "Video clip retrieval."
          operations:
            - name: list-video-clips
              method: GET
              description: "List recorded video clips from a camera."
              inputParameters:
                - name: systemId
                  in: path
                  type: string
                  required: true
                  description: "Security system ID."
                - name: cameraId
                  in: path
                  type: string
                  required: true
                  description: "Camera ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: adt-platform-rest
      resources:
        - path: /v1/systems
          name: systems
          description: "Security systems."
          operations:
            - method: GET
              name: list-systems
              description: "List systems."
              call: "adt-platform.list-systems"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: adt-platform-mcp
      transport: http
      tools:
        - name: list-security-systems
          description: "List all ADT security systems for the account."
          hints:
            readOnly: true
            openWorld: true
          call: "adt-platform.list-systems"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-system-status
          description: "Get current status of an ADT security system."
          hints:
            readOnly: true
            openWorld: false
          call: "adt-platform.get-system"
          with:
            systemId: "tools.systemId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: arm-security-system
          description: "Arm an ADT security system in away or stay mode."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "adt-platform.arm-system"
          with:
            systemId: "tools.systemId"
            mode: "tools.mode"
            accessCode: "tools.accessCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: disarm-security-system
          description: "Disarm an ADT security system."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "adt-platform.disarm-system"
          with:
            systemId: "tools.systemId"
            accessCode: "tools.accessCode"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-devices
          description: "List all security devices and sensors in an ADT system."
          hints:
            readOnly: true
            openWorld: true
          call: "adt-platform.list-devices"
          with:
            systemId: "tools.systemId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-security-events
          description: "List recent security events and alarm history."
          hints:
            readOnly: true
            openWorld: true
          call: "adt-platform.list-events"
          with:
            systemId: "tools.systemId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-access-codes
          description: "List all access codes for an ADT security system."
          hints:
            readOnly: true
            openWorld: true
          call: "adt-platform.list-access-codes"
          with:
            systemId: "tools.systemId"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-access-code
          description: "Create a new access code (e.g., temporary contractor code) for an ADT security system."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "adt-platform.create-access-code"
          with:
            systemId: "tools.systemId"
            name: "tools.name"
            code: "tools.code"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-video-clips
          description: "List recorded video clips from an ADT camera."
          hints:
            readOnly: true
            openWorld: true
          call: "adt-platform.list-video-clips"
          with:
            systemId: "tools.systemId"
            cameraId: "tools.cameraId"
          outputParameters:
            - type: object
              mapping: "$."
