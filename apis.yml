apis:
  - name: ADT+ Platform API
    description: >-
      The ADT+ Platform API provides programmatic access to ADT's smart home security platform, enabling management of
      security devices, sensors, cameras, locks, and automation rules. Supports real-time status monitoring, arming and
      disarming, video clip retrieval, and alert management for residential and commercial security systems.
    humanURL: https://www.adt.com/smart-home
