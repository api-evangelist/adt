specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: ADT
providerId: adt
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: ADT lacks a publicly-priced developer API. FinOps mapping is illustrative only and
  assumes contract-based partner billing.
tags:
  - FinOps
  - FOCUS
  - Home Security
  - IoT
description: 'FOCUS-aligned FinOps for ADT: contract-based partner billing for security and
  monitoring integrations.'
sources:
  - https://www.adt.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ADT LLC
serviceCategory: Security and Monitoring
billingModel:
  pricingCategory: Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: ADT
  ServiceCategory: Security and Monitoring
  ProviderName: ADT
  PublisherName: ADT LLC
  InvoiceIssuerName: ADT LLC
  BillingCurrency: USD
meters:
  - name: monitored_sites
    unit: site
    aggregation: max
    dimensions:
      - region
      - service_plan
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - partner
      - environment
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Reconcile partner usage reports against ADT-issued invoices for the integration.
  - name: Allocation
    description: Tag API calls and monitored sites with the consuming product/team for partner chargeback.
  - name: Optimization
    description: Cache device state; batch event subscriptions; renegotiate partner volume tiers
      annually.
  - name: Accountability
    description: Assign partner-integration budget owner; review monthly invoice variances.
